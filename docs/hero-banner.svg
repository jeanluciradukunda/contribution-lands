<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1f3a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(100,160,255,0.06)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="960" height="320" fill="url(#sky)"/>
  <rect width="960" height="320" fill="url(#grid)"/>

  <!-- Ground contour lines -->
  <path d="M0 280 Q120 270 240 278 Q360 286 480 275 Q600 264 720 272 Q840 280 960 268" stroke="#2a5a8a" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M0 290 Q120 282 240 288 Q360 294 480 285 Q600 276 720 284 Q840 292 960 280" stroke="#2a5a8a" stroke-width="0.6" fill="none" opacity="0.3"/>
  <path d="M0 300 Q120 294 240 298 Q360 302 480 296 Q600 290 720 296 Q840 302 960 294" stroke="#2a5a8a" stroke-width="0.5" fill="none" opacity="0.2"/>

  <!-- LEFT SIDE: Forest biome -->
  <g transform="translate(40, 0)">
    <!-- Label -->
    <text x="0" y="30" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#5a7090" letter-spacing="0.15em">FOREST BIOME — LEVELS 0-4</text>

    <!-- Level 0: grass -->
    <g transform="translate(20, 260)">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#4ade80" stroke-width="0.8" opacity="0.4"/>
      <line x1="8" y1="0" x2="8" y2="-4" stroke="#4ade80" stroke-width="0.6" opacity="0.3"/>
      <line x1="20" y1="0" x2="20" y2="-3" stroke="#4ade80" stroke-width="0.6" opacity="0.3"/>
      <line x1="32" y1="0" x2="32" y2="-5" stroke="#4ade80" stroke-width="0.6" opacity="0.3"/>
      <text x="0" y="16" font-family="'IBM Plex Mono', monospace" font-size="7" fill="#5a7090">LVL 0</text>
    </g>

    <!-- Level 1: sapling -->
    <g transform="translate(90, 240)">
      <line x1="20" y1="20" x2="20" y2="0" stroke="#4ade80" stroke-width="1.2"/>
      <polygon points="12,8 20,-8 28,8" fill="none" stroke="#4ade80" stroke-width="1"/>
      <text x="6" y="36" font-family="'IBM Plex Mono', monospace" font-size="7" fill="#5a7090">LVL 1</text>
    </g>

    <!-- Level 2: young tree -->
    <g transform="translate(160, 210)">
      <line x1="25" y1="50" x2="25" y2="15" stroke="#4ade80" stroke-width="1.5"/>
      <polygon points="10,25 25,0 40,25" fill="none" stroke="#4ade80" stroke-width="1"/>
      <polygon points="13,35 25,12 37,35" fill="none" stroke="#4ade80" stroke-width="0.8"/>
      <line x1="17" y1="30" x2="10" y2="22" stroke="#4ade80" stroke-width="0.6" opacity="0.5"/>
      <line x1="33" y1="30" x2="40" y2="22" stroke="#4ade80" stroke-width="0.6" opacity="0.5"/>
      <text x="8" y="66" font-family="'IBM Plex Mono', monospace" font-size="7" fill="#5a7090">LVL 2</text>
    </g>

    <!-- Level 3: mature tree -->
    <g transform="translate(240, 170)">
      <line x1="30" y1="90" x2="30" y2="30" stroke="#4ade80" stroke-width="2"/>
      <circle cx="30" cy="25" r="22" fill="none" stroke="#4ade80" stroke-width="1"/>
      <circle cx="22" cy="18" r="12" fill="none" stroke="#4ade80" stroke-width="0.7" opacity="0.5"/>
      <circle cx="38" cy="20" r="10" fill="none" stroke="#4ade80" stroke-width="0.7" opacity="0.5"/>
      <line x1="20" y1="50" x2="8" y2="40" stroke="#4ade80" stroke-width="0.8" opacity="0.4"/>
      <line x1="40" y1="50" x2="52" y2="40" stroke="#4ade80" stroke-width="0.8" opacity="0.4"/>
      <text x="10" y="106" font-family="'IBM Plex Mono', monospace" font-size="7" fill="#5a7090">LVL 3</text>
    </g>

    <!-- Level 4: ancient redwood -->
    <g transform="translate(330, 100)">
      <line x1="35" y1="160" x2="35" y2="40" stroke="#4ade80" stroke-width="3"/>
      <polygon points="5,60 35,0 65,60" fill="none" stroke="#4ade80" stroke-width="1.2"/>
      <polygon points="10,90 35,35 60,90" fill="none" stroke="#4ade80" stroke-width="1"/>
      <polygon points="12,120 35,65 58,120" fill="none" stroke="#4ade80" stroke-width="0.8"/>
      <circle cx="20" cy="30" r="8" fill="none" stroke="#4ade80" stroke-width="0.6" opacity="0.4"/>
      <circle cx="50" cy="35" r="7" fill="none" stroke="#4ade80" stroke-width="0.6" opacity="0.4"/>
      <text x="10" y="176" font-family="'IBM Plex Mono', monospace" font-size="7" fill="#5a7090">LVL 4</text>
      <!-- Dimension arrow -->
      <line x1="72" y1="160" x2="72" y2="0" stroke="#ffcc73" stroke-width="0.6" stroke-dasharray="3,2"/>
      <polygon points="72,-4 69,2 75,2" fill="#ffcc73"/>
      <polygon points="72,164 69,158 75,158" fill="#ffcc73"/>
      <text x="76" y="85" font-family="'IBM Plex Mono', monospace" font-size="7" fill="#ffcc73" transform="rotate(-90, 76, 85)">160px</text>
    </g>
  </g>

  <!-- CENTER: divider -->
  <line x1="480" y1="40" x2="480" y2="290" stroke="#2a5a8a" stroke-width="0.5" stroke-dasharray="4,4"/>
  <circle cx="480" cy="40" r="3" fill="none" stroke="#4a90d9" stroke-width="0.8"/>
  <line x1="477" y1="40" x2="483" y2="40" stroke="#4a90d9" stroke-width="0.8"/>
  <line x1="480" y1="37" x2="480" y2="43" stroke="#4a90d9" stroke-width="0.8"/>

  <!-- RIGHT SIDE: City biome (NYC) -->
  <g transform="translate(510, 0)">
    <!-- Label -->
    <text x="0" y="30" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#5a7090" letter-spacing="0.15em">NYC SKYLINE — LEVELS 0-4</text>

    <!-- Level 0: empty lot -->
    <g transform="translate(10, 250)">
      <rect x="0" y="0" width="40" height="10" fill="none" stroke="#ffcc73" stroke-width="0.6" stroke-dasharray="2,2"/>
      <text x="4" y="26" font-family="'IBM Plex Mono', monospace" font-size="7" fill="#5a7090">LVL 0</text>
    </g>

    <!-- Level 1: brownstone -->
    <g transform="translate(80, 220)">
      <rect x="0" y="0" width="36" height="40" rx="1" fill="none" stroke="#ffcc73" stroke-width="1"/>
      <rect x="6" y="6" width="8" height="8" fill="none" stroke="#ffcc73" stroke-width="0.5" opacity="0.5"/>
      <rect x="22" y="6" width="8" height="8" fill="none" stroke="#ffcc73" stroke-width="0.5" opacity="0.5"/>
      <rect x="6" y="20" width="8" height="8" fill="none" stroke="#ffcc73" stroke-width="0.5" opacity="0.5"/>
      <rect x="22" y="20" width="8" height="8" fill="none" stroke="#ffcc73" stroke-width="0.5" opacity="0.5"/>
      <rect x="13" y="30" width="10" height="10" fill="none" stroke="#ffcc73" stroke-width="0.6"/>
      <text x="4" y="56" font-family="'IBM Plex Mono', monospace" font-size="7" fill="#5a7090">LVL 1</text>
    </g>

    <!-- Level 2: apartment -->
    <g transform="translate(150, 180)">
      <rect x="0" y="0" width="40" height="80" rx="1" fill="none" stroke="#ffcc73" stroke-width="1"/>
      <g opacity="0.4">
        <rect x="6" y="6" width="6" height="6" fill="none" stroke="#ffcc73" stroke-width="0.5"/>
        <rect x="17" y="6" width="6" height="6" fill="none" stroke="#ffcc73" stroke-width="0.5"/>
        <rect x="28" y="6" width="6" height="6" fill="none" stroke="#ffcc73" stroke-width="0.5"/>
        <rect x="6" y="18" width="6" height="6" fill="none" stroke="#ffcc73" stroke-width="0.5"/>
        <rect x="17" y="18" width="6" height="6" fill="none" stroke="#ffcc73" stroke-width="0.5"/>
        <rect x="28" y="18" width="6" height="6" fill="none" stroke="#ffcc73" stroke-width="0.5"/>
        <rect x="6" y="30" width="6" height="6" fill="none" stroke="#ffcc73" stroke-width="0.5"/>
        <rect x="17" y="30" width="6" height="6" fill="none" stroke="#ffcc73" stroke-width="0.5"/>
        <rect x="28" y="30" width="6" height="6" fill="none" stroke="#ffcc73" stroke-width="0.5"/>
        <rect x="6" y="42" width="6" height="6" fill="none" stroke="#ffcc73" stroke-width="0.5"/>
        <rect x="17" y="42" width="6" height="6" fill="none" stroke="#ffcc73" stroke-width="0.5"/>
        <rect x="28" y="42" width="6" height="6" fill="none" stroke="#ffcc73" stroke-width="0.5"/>
        <rect x="6" y="54" width="6" height="6" fill="none" stroke="#ffcc73" stroke-width="0.5"/>
        <rect x="17" y="54" width="6" height="6" fill="none" stroke="#ffcc73" stroke-width="0.5"/>
        <rect x="28" y="54" width="6" height="6" fill="none" stroke="#ffcc73" stroke-width="0.5"/>
      </g>
      <text x="4" y="96" font-family="'IBM Plex Mono', monospace" font-size="7" fill="#5a7090">LVL 2</text>
    </g>

    <!-- Level 3: skyscraper -->
    <g transform="translate(230, 120)">
      <rect x="5" y="0" width="35" height="140" rx="1" fill="none" stroke="#ffcc73" stroke-width="1.2"/>
      <rect x="0" y="135" width="45" height="5" fill="none" stroke="#ffcc73" stroke-width="0.6"/>
      <g opacity="0.3">
        <line x1="12" y1="10" x2="12" y2="130" stroke="#ffcc73" stroke-width="0.4"/>
        <line x1="22" y1="10" x2="22" y2="130" stroke="#ffcc73" stroke-width="0.4"/>
        <line x1="33" y1="10" x2="33" y2="130" stroke="#ffcc73" stroke-width="0.4"/>
      </g>
      <text x="4" y="156" font-family="'IBM Plex Mono', monospace" font-size="7" fill="#5a7090">LVL 3</text>
    </g>

    <!-- Level 4: supertall -->
    <g transform="translate(310, 50)">
      <rect x="10" y="0" width="30" height="210" rx="1" fill="none" stroke="#ffcc73" stroke-width="1.5"/>
      <polygon points="25,-15 10,0 40,0" fill="none" stroke="#ffcc73" stroke-width="1"/>
      <rect x="5" y="205" width="40" height="5" fill="none" stroke="#ffcc73" stroke-width="0.6"/>
      <g opacity="0.25">
        <line x1="18" y1="10" x2="18" y2="200" stroke="#ffcc73" stroke-width="0.4"/>
        <line x1="25" y1="5" x2="25" y2="200" stroke="#ffcc73" stroke-width="0.4"/>
        <line x1="33" y1="10" x2="33" y2="200" stroke="#ffcc73" stroke-width="0.4"/>
      </g>
      <!-- Dimension arrow -->
      <line x1="56" y1="210" x2="56" y2="-15" stroke="#ffcc73" stroke-width="0.6" stroke-dasharray="3,2"/>
      <polygon points="56,-19 53,-13 59,-13" fill="#ffcc73"/>
      <polygon points="56,214 53,208 59,208" fill="#ffcc73"/>
      <text x="60" y="105" font-family="'IBM Plex Mono', monospace" font-size="7" fill="#ffcc73" transform="rotate(-90, 60, 105)">225px</text>
      <text x="6" y="226" font-family="'IBM Plex Mono', monospace" font-size="7" fill="#5a7090">LVL 4</text>
    </g>
  </g>

  <!-- Title block (bottom-right) -->
  <g transform="translate(740, 280)">
    <rect x="0" y="0" width="200" height="30" fill="none" stroke="#2a5a8a" stroke-width="0.8"/>
    <line x1="0" y1="15" x2="200" y2="15" stroke="#2a5a8a" stroke-width="0.5"/>
    <text x="8" y="11" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#4a90d9" letter-spacing="0.1em">CONTRIBUTION LANDS</text>
    <text x="8" y="25" font-family="'IBM Plex Mono', monospace" font-size="6.5" fill="#5a7090">BLUEPRINT — FOREST × CITY PROGRESSION</text>
  </g>

  <!-- Compass rose (bottom-left) -->
  <g transform="translate(30, 290)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#2a5a8a" stroke-width="0.6"/>
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#4a90d9" stroke-width="0.5"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#4a90d9" stroke-width="0.5"/>
    <text x="-2" y="-14" font-family="'IBM Plex Mono', monospace" font-size="6" fill="#4a90d9">N</text>
  </g>
</svg>
