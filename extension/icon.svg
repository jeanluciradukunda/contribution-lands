<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Globe base: green contribution grid pattern -->
  <defs>
    <clipPath id="globe">
      <circle cx="64" cy="72" r="44"/>
    </clipPath>
    <linearGradient id="globeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ea44f"/>
      <stop offset="100%" stop-color="#1a7f37"/>
    </linearGradient>
  </defs>

  <!-- Globe sphere -->
  <circle cx="64" cy="72" r="44" fill="url(#globeGrad)" opacity="0.9"/>

  <!-- Contribution grid squares on globe -->
  <g clip-path="url(#globe)" opacity="0.6">
    <!-- Row 1 -->
    <rect x="24" y="52" width="5" height="5" rx="1" fill="#0e4429"/>
    <rect x="31" y="52" width="5" height="5" rx="1" fill="#006d32"/>
    <rect x="38" y="52" width="5" height="5" rx="1" fill="#26a641"/>
    <rect x="45" y="52" width="5" height="5" rx="1" fill="#39d353"/>
    <rect x="52" y="52" width="5" height="5" rx="1" fill="#006d32"/>
    <rect x="59" y="52" width="5" height="5" rx="1" fill="#0e4429"/>
    <rect x="66" y="52" width="5" height="5" rx="1" fill="#26a641"/>
    <rect x="73" y="52" width="5" height="5" rx="1" fill="#39d353"/>
    <rect x="80" y="52" width="5" height="5" rx="1" fill="#006d32"/>
    <rect x="87" y="52" width="5" height="5" rx="1" fill="#0e4429"/>
    <rect x="94" y="52" width="5" height="5" rx="1" fill="#26a641"/>
    <!-- Row 2 -->
    <rect x="24" y="59" width="5" height="5" rx="1" fill="#39d353"/>
    <rect x="31" y="59" width="5" height="5" rx="1" fill="#0e4429"/>
    <rect x="38" y="59" width="5" height="5" rx="1" fill="#006d32"/>
    <rect x="45" y="59" width="5" height="5" rx="1" fill="#0e4429"/>
    <rect x="52" y="59" width="5" height="5" rx="1" fill="#39d353"/>
    <rect x="59" y="59" width="5" height="5" rx="1" fill="#26a641"/>
    <rect x="66" y="59" width="5" height="5" rx="1" fill="#006d32"/>
    <rect x="73" y="59" width="5" height="5" rx="1" fill="#0e4429"/>
    <rect x="80" y="59" width="5" height="5" rx="1" fill="#39d353"/>
    <rect x="87" y="59" width="5" height="5" rx="1" fill="#26a641"/>
    <rect x="94" y="59" width="5" height="5" rx="1" fill="#006d32"/>
    <!-- Row 3 -->
    <rect x="24" y="66" width="5" height="5" rx="1" fill="#006d32"/>
    <rect x="31" y="66" width="5" height="5" rx="1" fill="#26a641"/>
    <rect x="38" y="66" width="5" height="5" rx="1" fill="#39d353"/>
    <rect x="45" y="66" width="5" height="5" rx="1" fill="#26a641"/>
    <rect x="52" y="66" width="5" height="5" rx="1" fill="#006d32"/>
    <rect x="59" y="66" width="5" height="5" rx="1" fill="#39d353"/>
    <rect x="66" y="66" width="5" height="5" rx="1" fill="#0e4429"/>
    <rect x="73" y="66" width="5" height="5" rx="1" fill="#26a641"/>
    <rect x="80" y="66" width="5" height="5" rx="1" fill="#006d32"/>
    <rect x="87" y="66" width="5" height="5" rx="1" fill="#39d353"/>
    <rect x="94" y="66" width="5" height="5" rx="1" fill="#0e4429"/>
    <!-- Row 4 -->
