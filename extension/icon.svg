  <!-- Globe highlight -->
  <circle cx="52" cy="60" r="20" fill="white" opacity="0.08"/>

  <!-- Themes rising above the globe -->

  <!-- Pine tree (forest theme) -->
  <g transform="translate(34, 8)">
    <!-- Trunk -->
    <rect x="4" y="24" width="3" height="8" fill="#5c3d1a"/>
    <!-- Canopy layers -->
    <polygon points="5.5,4 12,20 -1,20" fill="#1a6b10"/>
    <polygon points="5.5,10 11,22 0,22" fill="#0d5a08"/>
  </g>

  <!-- NYC Building (city theme) -->
  <g transform="translate(56, 2)">
    <!-- Building body -->
    <rect x="2" y="12" width="12" height="30" fill="#8899aa" rx="1"/>
    <!-- Setback -->
    <rect x="4" y="6" width="8" height="8" fill="#99aabb" rx="1"/>
    <!-- Antenna -->
    <line x1="8" y1="6" x2="8" y2="0" stroke="#aaa" stroke-width="1.5"/>
    <circle cx="8" cy="0" r="1.5" fill="#ff3333"/>
    <!-- Windows -->
    <rect x="4" y="15" width="2" height="2" fill="#ffd866" rx="0.3"/>
    <rect x="7" y="15" width="2" height="2" fill="#aa8833" rx="0.3"/>
    <rect x="10" y="15" width="2" height="2" fill="#ffd866" rx="0.3"/>
    <rect x="4" y="19" width="2" height="2" fill="#ffd866" rx="0.3"/>
    <rect x="7" y="19" width="2" height="2" fill="#ffd866" rx="0.3"/>
    <rect x="10" y="19" width="2" height="2" fill="#aa8833" rx="0.3"/>
    <rect x="4" y="23" width="2" height="2" fill="#aa8833" rx="0.3"/>
    <rect x="7" y="23" width="2" height="2" fill="#ffd866" rx="0.3"/>
    <rect x="10" y="23" width="2" height="2" fill="#ffd866" rx="0.3"/>
    <rect x="4" y="27" width="2" height="2" fill="#ffd866" rx="0.3"/>
    <rect x="7" y="27" width="2" height="2" fill="#ffd866" rx="0.3"/>
    <rect x="10" y="27" width="2" height="2" fill="#aa8833" rx="0.3"/>
    <rect x="4" y="31" width="2" height="2" fill="#aa8833" rx="0.3"/>
    <rect x="7" y="31" width="2" height="2" fill="#ffd866" rx="0.3"/>
    <rect x="10" y="31" width="2" height="2" fill="#ffd866" rx="0.3"/>
    <rect x="4" y="35" width="2" height="2" fill="#ffd866" rx="0.3"/>
    <rect x="7" y="35" width="2" height="2" fill="#aa8833" rx="0.3"/>
    <rect x="10" y="35" width="2" height="2" fill="#ffd866" rx="0.3"/>
  </g>

  <!-- Cherry blossom tree (spring theme) -->
  <g transform="translate(82, 12)">
    <!-- Trunk -->
    <rect x="4" y="22" width="3" height="10" fill="#6b4820"/>
    <!-- Pink canopy blobs -->
    <circle cx="5.5" cy="16" r="5" fill="#ff88aa"/>
    <circle cx="2" cy="19" r="4" fill="#ffaacc"/>
    <circle cx="9" cy="18" r="4" fill="#ff99bb"/>
    <circle cx="5.5" cy="12" r="4" fill="#ffbbdd"/>
    <!-- Petals -->
    <circle cx="0" cy="24" r="1" fill="#ffccee" opacity="0.7"/>
    <circle cx="11" cy="26" r="1" fill="#ffbbdd" opacity="0.7"/>
    <circle cx="3" cy="28" r="0.8" fill="#ffccee" opacity="0.5"/>
  </g>

  <!-- Snowflakes (winter hint) -->
  <circle cx="24" cy="20" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="28" cy="28" r="1" fill="white" opacity="0.4"/>
  <circle cx="20" cy="30" r="1.2" fill="white" opacity="0.5"/>

  <!-- Autumn leaf -->
  <g transform="translate(104, 22) rotate(25)">
    <ellipse cx="0" cy="0" rx="4" ry="2.5" fill="#cc6622"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#aa4411" stroke-width="0.5"/>
  </g>
</svg>
