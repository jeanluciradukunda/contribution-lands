    <rect x="87" y="80" width="5" height="5" rx="1" fill="#006d32"/>
    <rect x="94" y="80" width="5" height="5" rx="1" fill="#39d353"/>
    <!-- Row 6 -->
    <rect x="24" y="87" width="5" height="5" rx="1" fill="#006d32"/>
    <rect x="31" y="87" width="5" height="5" rx="1" fill="#0e4429"/>
    <rect x="38" y="87" width="5" height="5" rx="1" fill="#26a641"/>
    <rect x="45" y="87" width="5" height="5" rx="1" fill="#0e4429"/>
    <rect x="52" y="87" width="5" height="5" rx="1" fill="#39d353"/>
    <rect x="59" y="87" width="5" height="5" rx="1" fill="#006d32"/>
    <rect x="66" y="87" width="5" height="5" rx="1" fill="#39d353"/>
