<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contribution Lands — NYC Theme Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117; color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; padding: 40px 20px;
    }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .header img { width: 36px; height: 36px; }
    h1 { font-size: 22px; font-weight: 600; }
    .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 24px; }
    .canvas-wrapper {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 10px; padding: 24px; overflow-x: auto; max-width: 100%;
    }
    canvas { display: block; }
    #tooltip {
      position: fixed; background: #1c2128; border: 1px solid #30363d;
      border-radius: 6px; padding: 6px 10px; font-size: 12px;
      color: #e6edf3; pointer-events: none; display: none;
      z-index: 100; white-space: nowrap;
    }
    .legend {
      display: flex; gap: 8px; margin-top: 16px; font-size: 12px;
      color: #8b949e; align-items: center;
    }
    .legend img { width: 20px; image-rendering: pixelated; }
    .sprite-preview {
      display: flex; gap: 16px; margin-top: 24px; align-items: flex-end;
      background: #161b22; border: 1px solid #30363d; border-radius: 10px;
      padding: 20px 24px;
    }
    .sprite-preview .level {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .sprite-preview .level img { image-rendering: pixelated; max-height: 120px; }
    .sprite-preview .level span { font-size: 11px; color: #8b949e; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.svg" alt="Contribution Lands">
    <h1>Contribution Lands</h1>
  </div>
  <p class="subtitle">NYC Skyline theme — real sprite rendering test</p>

  <div class="sprite-preview">
    <div class="level"><img src="../themes/city-nyc/sprites/level-0-a.png"><span>L0</span></div>
    <div class="level"><img src="../themes/city-nyc/sprites/level-1-a.png"><span>L1</span></div>
    <div class="level"><img src="../themes/city-nyc/sprites/level-2-a.png"><span>L2</span></div>
    <div class="level"><img src="../themes/city-nyc/sprites/level-3-b.png"><span>L3</span></div>
    <div class="level"><img src="../themes/city-nyc/sprites/level-4-b.png"><span>L4</span></div>
  </div>

  <p style="color:#8b949e; font-size:12px; margin: 12px 0 20px;">Sprite scale progression — Level 0 (no contributions) → Level 4 (max contributions)</p>

  <div class="canvas-wrapper">
    <canvas id="canvas"></canvas>
  </div>

  <div id="tooltip"></div>

  <script>
    // ========== CONFIG ==========
    const WEEKS = 52, DAYS = 7;
    const TILE_W = 20, TILE_H = 10;
    const SPRITE_SCALE = 0.16; // Scale 128px sprites to ~20px to fit grid tiles

    const THEME = {
      bg: '#0a0e14',
      groundColors: ['#3a3a40', '#35353b', '#404046'],
      groundStroke: '#2a2a30',
    };

    // Sprite paths per level (multiple variants)
    const SPRITE_PATHS = {
      1: ['../themes/city-nyc/sprites/level-1-a.png', '../themes/city-nyc/sprites/level-1-b.png', '../themes/city-nyc/sprites/level-1-c.png'],
      2: ['../themes/city-nyc/sprites/level-2-a.png', '../themes/city-nyc/sprites/level-2-b.png', '../themes/city-nyc/sprites/level-2-c.png'],
      3: ['../themes/city-nyc/sprites/level-3-a.png', '../themes/city-nyc/sprites/level-3-b.png', '../themes/city-nyc/sprites/level-3-c.png'],
      4: ['../themes/city-nyc/sprites/level-4-a.png', '../themes/city-nyc/sprites/level-4-b.png', '../themes/city-nyc/sprites/level-4-c.png'],
    };

    // L0 sprites grouped by category
    const L0_SPRITES = {
      // Road tiles (directional — chosen by matrix rules)
      road_ns:    ['../themes/city-nyc/sprites/level-0-road-ns.png'],     // avenue direction
      road_ew:    ['../themes/city-nyc/sprites/level-0-road-ew.png'],     // cross street direction
      road_cross: ['../themes/city-nyc/sprites/level-0-road-cross.png'],  // 4-way intersection
      road_t:     ['../themes/city-nyc/sprites/level-0-road-t1.png'],     // T-junction
      road_corner:['../themes/city-nyc/sprites/level-0-road-corner.png'], // corner turn
      road_bridge:['../themes/city-nyc/sprites/level-0-road-bridge.png'], // bridge
      road_tunnel:['../themes/city-nyc/sprites/level-0-road-tunnel.png'], // tunnel
      road_park:  ['../themes/city-nyc/sprites/level-0-road-parking.png'],// parking lot

      // Non-road L0
      sidewalk: [
        '../themes/city-nyc/sprites/level-0-k.png',
        '../themes/city-nyc/sprites/level-0-l.png',
        '../themes/city-nyc/sprites/level-0-u.png',
      ],
      grass: [
        '../themes/city-nyc/sprites/level-0-f.png',
        '../themes/city-nyc/sprites/level-0-g.png',
        '../themes/city-nyc/sprites/level-0-h.png',
        '../themes/city-nyc/sprites/level-0-p.png',
        '../themes/city-nyc/sprites/level-0-t.png',
      ],
      park: [
        '../themes/city-nyc/sprites/level-0-d.png',
        '../themes/city-nyc/sprites/level-0-n.png',
        '../themes/city-nyc/sprites/level-0-o.png',
        '../themes/city-nyc/sprites/level-0-r.png',
        '../themes/city-nyc/sprites/level-0-s.png',
        '../themes/city-nyc/sprites/level-0-v.png',
      ],
      urban: [
        '../themes/city-nyc/sprites/level-0-a.png',
        '../themes/city-nyc/sprites/level-0-c.png',
        '../themes/city-nyc/sprites/level-0-m.png',
        '../themes/city-nyc/sprites/level-0-q.png',
      ],
    };

    // Road grid config — creates rectangular city blocks
    const ROAD_INTERVAL = 6;           // Avenue every 6 columns
    const CROSS_STREETS = [0, 3, 6];   // 3 cross streets → 2 rows of blocks

    // ========== SEEDED RNG ==========
    function mulberry32(seed) {
      return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    // ========== FAKE CONTRIBUTIONS ==========
    function generateContributions() {
      const rng = mulberry32(42);
      const data = [];
      for (let w = 0; w < WEEKS; w++) {
        const week = [];
        const weekActivity = rng() < 0.15 ? 0 : rng();
        for (let d = 0; d < DAYS; d++) {
          let prob = weekActivity * (d === 0 || d === 6 ? 0.3 : 0.8);
          if (w > 10 && w < 25) prob *= 1.5;
          if (w > 35 && w < 45) prob *= 1.8;
          const val = rng();
          let level, count;
          if (val > prob * 0.9) { level = 0; count = 0; }
          else if (val > prob * 0.6) { level = 1; count = Math.floor(rng() * 3) + 1; }
          else if (val > prob * 0.35) { level = 2; count = Math.floor(rng() * 5) + 4; }
          else if (val > prob * 0.1) { level = 3; count = Math.floor(rng() * 8) + 9; }
          else { level = 4; count = Math.floor(rng() * 12) + 17; }
          week.push({ level, count, date: new Date(2025, 0, 1 + w * 7 + d) });
        }
        data.push(week);
      }
      return data;
    }

    // ========== ISO MATH ==========
    let gridOffsetX = 0, gridOffsetY = 0;

    function isoProject(col, row) {
      return {
        x: (col - row) * (TILE_W / 2),
        y: (col + row) * (TILE_H / 2),
      };
    }

    function gridToScreen(col, row) {
      const iso = isoProject(col, row);
      return { x: iso.x + gridOffsetX, y: iso.y + gridOffsetY };
    }

    // ========== DRAWING ==========
    function drawIsoDiamond(ctx, cx, cy, w, h, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(cx, cy - h / 2); ctx.lineTo(cx + w / 2, cy);
      ctx.lineTo(cx, cy + h / 2); ctx.lineTo(cx - w / 2, cy);
      ctx.closePath(); ctx.fillStyle = fill; ctx.fill();
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 0.5; ctx.stroke(); }
    }

    // ========== LOAD SPRITES ==========
    async function loadSprites() {
      const sprites = {};
      const promises = [];

      // Load level 1-4 sprites
      for (const [level, paths] of Object.entries(SPRITE_PATHS)) {
        sprites[level] = [];
        for (const path of paths) {
          const img = new Image();
          const p = new Promise((resolve) => {
            img.onload = () => { sprites[level].push(img); resolve(); };
            img.onerror = () => { console.warn(`Failed to load: ${path}`); resolve(); };
          });
          img.src = path;
          promises.push(p);
        }
      }

      // Load L0 categorized sprites
      sprites.l0 = {};
      for (const [category, paths] of Object.entries(L0_SPRITES)) {
        sprites.l0[category] = [];
        for (const path of paths) {
          const img = new Image();
          const p = new Promise((resolve) => {
            img.onload = () => { sprites.l0[category].push(img); resolve(); };
            img.onerror = () => { console.warn(`Failed to load L0: ${path}`); resolve(); };
          });
          img.src = path;
          promises.push(p);
        }
      }

      await Promise.all(promises);
      return sprites;
    }

    // ========== L0 PLACEMENT MATRIX ==========
    //
    // Road tile selection based on which neighbors are also roads:
    //   - Avenue only (column) → road_ns
    //   - Cross street only (row) → road_ew
    //   - Both (intersection) → road_cross
    //   - Avenue meets edge → road_corner or road_t
    //   - Special: occasional bridge/tunnel for variety
    //
    // Non-road cells:
    //   - Next to road → sidewalk
    //   - Next to building → sidewalk or urban
    //   - Open area → grass or park
    //
    // Entity pathing zones:
    //   - road_* cells → taxis, cyclists
    //   - sidewalk cells → pedestrians, dog walkers
    //   - grass/park cells → joggers, dog walkers

    function isAvenue(w) { return w % ROAD_INTERVAL === 0; }
    function isCrossStreet(d) { return CROSS_STREETS.includes(d); }
    function isRoadCell(w, d) { return isAvenue(w) || isCrossStreet(d); }

    // Auto-tiling: pick road sprite based on which neighbors are also roads.
    // Check 4 directions → determine connection pattern → pick matching tile.
    function pickRoadType(w, d) {
      // Which directions connect to other road cells?
      const n = d > 0 && isRoadCell(w, d - 1);           // north (up in grid)
      const s = d < DAYS - 1 && isRoadCell(w, d + 1);    // south (down in grid)
      const e = w < WEEKS - 1 && isRoadCell(w + 1, d);   // east (right in grid)
      const ww = w > 0 && isRoadCell(w - 1, d);          // west (left in grid)

      const connections = (n ? 1 : 0) + (s ? 1 : 0) + (e ? 1 : 0) + (ww ? 1 : 0);

      // Variety RNG for special tiles
      const rng = mulberry32((w * 7 + d) * 77777 + 11111);
      const r = rng();

      // 4-way intersection
      if (connections >= 3) return 'road_cross';

      // Corners (exactly 2 perpendicular connections)
      if (connections === 2) {
        if ((n && s) || (e && ww)) {
          // Straight road (parallel connections)
          if (n && s) {
            // NS straight (avenue) — occasional specials
            if (r < 0.10) return 'road_bridge';
            if (r < 0.15) return 'road_tunnel';
            return 'road_ns';
          } else {
            // EW straight (cross street) — occasional specials
            if (r < 0.08) return 'road_bridge';
            if (r < 0.14) return 'road_park';
            return 'road_ew';
          }
        }
        // Perpendicular → corner
        return 'road_corner';
      }

      // Dead end or single connection
      if (n || s) return 'road_ns';
      if (e || ww) return 'road_ew';

      // Isolated road cell (shouldn't happen with grid config)
      return 'road_cross';
    }

    function buildL0Map(contributions) {
      const map = Array.from({ length: WEEKS }, () => Array(DAYS).fill(null));

      for (let w = 0; w < WEEKS; w++) {
        for (let d = 0; d < DAYS; d++) {
          if (contributions[w][d].level > 0) continue;

          // Road cells — pick directional tile
          if (isRoadCell(w, d)) {
            map[w][d] = pickRoadType(w, d);
            continue;
          }

          // Non-road: check neighbors
          const dirs = [[w-1,d],[w+1,d],[w,d-1],[w,d+1],[w-1,d-1],[w+1,d+1],[w-1,d+1],[w+1,d-1]];
          let nearRoad = false, nearBuilding = false, emptyNeighbors = 0;
          for (const [nw, nd] of dirs) {
            if (nw >= 0 && nw < WEEKS && nd >= 0 && nd < DAYS) {
              if (isRoadCell(nw, nd)) nearRoad = true;
              if (contributions[nw][nd].level > 0) nearBuilding = true;
              if (contributions[nw][nd].level === 0 && !isRoadCell(nw, nd)) emptyNeighbors++;
            }
          }

          const rng = mulberry32((w * 7 + d) * 99991 + 54321);
          const r = rng();

          if (nearRoad) {
            map[w][d] = r < 0.6 ? 'sidewalk' : 'urban';
          } else if (nearBuilding) {
            map[w][d] = r < 0.4 ? 'sidewalk' : r < 0.7 ? 'urban' : 'grass';
          } else if (emptyNeighbors >= 5) {
            map[w][d] = r < 0.5 ? 'park' : 'grass';
          } else {
            map[w][d] = r < 0.3 ? 'grass' : r < 0.5 ? 'park' : r < 0.75 ? 'urban' : 'sidewalk';
          }
        }
      }
      return map;
    }

    // ========== MAIN ==========
    async function main() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const tooltip = document.getElementById('tooltip');
      const contributions = generateContributions();
      const sprites = await loadSprites();

      // Calculate canvas size
      const maxIso = isoProject(WEEKS - 1, 0);
      const minIso = isoProject(0, DAYS - 1);
      const padding = 100;
      const topPadding = 150; // Extra room for tall sprites
      const canvasW = (maxIso.x - minIso.x) + TILE_W + padding * 2;
      const canvasH = (isoProject(WEEKS - 1, DAYS - 1).y - isoProject(0, 0).y) + TILE_H + padding * 2 + topPadding;

      canvas.width = canvasW;
      canvas.height = canvasH;
      gridOffsetX = -minIso.x + TILE_W / 2 + padding;
      gridOffsetY = padding + topPadding;

      // Background
      ctx.fillStyle = THEME.bg;
      ctx.fillRect(0, 0, canvasW, canvasH);

      // Pre-compute placement
      const l0Map = buildL0Map(contributions);

      // ---- LAYER 1: All ground diamonds ----
      for (let w = 0; w < WEEKS; w++) {
        for (let d = 0; d < DAYS; d++) {
          const scr = gridToScreen(w, d);
          const gc = THEME.groundColors[((w + d) * 7 + w) % THEME.groundColors.length];
          drawIsoDiamond(ctx, scr.x, scr.y, TILE_W, TILE_H, gc, THEME.groundStroke);
        }
      }

      // ---- LAYER 2: Programmatic road grid (painted over ground) ----
      // Avenues: one filled strip per column (hexagonal outline of all diamonds)
      for (let w = 0; w < WEEKS; w += ROAD_INTERVAL) {
        const f = gridToScreen(w, 0);
        const l = gridToScreen(w, DAYS - 1);
        ctx.beginPath();
        ctx.moveTo(f.x, f.y - TILE_H / 2);
        ctx.lineTo(f.x + TILE_W / 2, f.y);
        ctx.lineTo(l.x + TILE_W / 2, l.y);
        ctx.lineTo(l.x, l.y + TILE_H / 2);
        ctx.lineTo(l.x - TILE_W / 2, l.y);
        ctx.lineTo(f.x - TILE_W / 2, f.y);
        ctx.closePath();
        ctx.fillStyle = '#505058';
        ctx.fill();
        ctx.strokeStyle = '#666670';
        ctx.lineWidth = 0.5;
        ctx.stroke();
        // Yellow center dash
        ctx.strokeStyle = '#ccbb44';
        ctx.lineWidth = 0.8;
        ctx.setLineDash([3, 4]);
        ctx.beginPath(); ctx.moveTo(f.x, f.y); ctx.lineTo(l.x, l.y); ctx.stroke();
        ctx.setLineDash([]);
      }

      // Cross streets: one filled parallelogram per row
      for (const d of CROSS_STREETS) {
        const f = gridToScreen(0, d);
        const l = gridToScreen(WEEKS - 1, d);
        ctx.beginPath();
        ctx.moveTo(f.x, f.y - TILE_H / 2);
        ctx.lineTo(l.x + TILE_W / 2, l.y);
        ctx.lineTo(l.x, l.y + TILE_H / 2);
        ctx.lineTo(f.x - TILE_W / 2, f.y);
        ctx.closePath();
        ctx.fillStyle = '#505058';
        ctx.fill();
        ctx.strokeStyle = '#666670';
        ctx.lineWidth = 0.5;
        ctx.stroke();
        // Yellow center dash
        ctx.strokeStyle = '#ccbb44';
        ctx.lineWidth = 0.8;
        ctx.setLineDash([3, 4]);
        ctx.beginPath(); ctx.moveTo(f.x, f.y); ctx.lineTo(l.x, l.y); ctx.stroke();
        ctx.setLineDash([]);
      }

      // ---- LAYER 3: Road decorations (sprites placed ON roads) ----
      // Rules:
      //   - Max 1 bridge per road, only on roads with 8+ cells, not near intersections
      //   - Max 1 tunnel per road, not on same road as bridge
      //   - Street trees every 3-5 cells along road edges
      //   - Street lamps every 4-6 cells
      //   - Parked cars / food trucks sparse, near block edges
      //   - Never same decoration on adjacent cells
      //   - Intersections get their own decoration (crosswalk sprite)

      const roadDecorMap = Array.from({ length: WEEKS }, () => Array(DAYS).fill(null));

      function decorateRoadSegment(cells, isVertical) {
        // cells = array of {w, d} for one continuous road segment
        if (cells.length < 2) return;

        const rng = mulberry32(cells[0].w * 1000 + cells[0].d * 77 + 42);

        // Track what's been placed on this segment
        let hasBridge = false;
        let hasTunnel = false;
        let lastDecoAt = -10; // index of last decoration placement

        for (let i = 0; i < cells.length; i++) {
          const { w, d } = cells[i];
          const r = rng();

          // Skip intersections — they're where avenues meet cross streets
          if (isAvenue(w) && isCrossStreet(d)) {
            roadDecorMap[w][d] = 'road_cross';
            lastDecoAt = i;
            continue;
          }

          const distFromLast = i - lastDecoAt;
          const distFromEnd = Math.min(i, cells.length - 1 - i);

          // Bridge: once per road, only long roads, not near edges or intersections
          if (!hasBridge && cells.length >= 8 && distFromEnd >= 3 && distFromLast >= 4 && r < 0.15) {
            roadDecorMap[w][d] = 'road_bridge';
            hasBridge = true;
            lastDecoAt = i;
            continue;
          }

          // Tunnel: once per road, not if bridge already placed, not near edges
          if (!hasTunnel && !hasBridge && cells.length >= 6 && distFromEnd >= 2 && distFromLast >= 4 && r < 0.12) {
            roadDecorMap[w][d] = 'road_tunnel';
            hasTunnel = true;
            lastDecoAt = i;
            continue;
          }

          // Street trees: every 3-5 cells
          if (distFromLast >= 3 && r < 0.35) {
            roadDecorMap[w][d] = 'tree';
            lastDecoAt = i;
            continue;
          }

          // Street lamps: every 4-6 cells, not adjacent to trees
          if (distFromLast >= 4 && r < 0.25) {
            roadDecorMap[w][d] = 'lamp';
            lastDecoAt = i;
            continue;
          }

          // Parked cars / food truck: sparse, near block edges
          if (distFromLast >= 3 && distFromEnd <= 2 && r < 0.3) {
            roadDecorMap[w][d] = r < 0.15 ? 'food_truck' : 'parking';
            lastDecoAt = i;
            continue;
          }
        }
      }

      // Collect avenue segments (column road cells between intersections)
      for (let w = 0; w < WEEKS; w += ROAD_INTERVAL) {
        const cells = [];
        for (let d = 0; d < DAYS; d++) {
          cells.push({ w, d });
        }
        decorateRoadSegment(cells, true);
      }

      // Collect cross street segments (row road cells between intersections)
      for (const d of CROSS_STREETS) {
        const cells = [];
        for (let w = 0; w < WEEKS; w++) {
          cells.push({ w, d });
        }
        decorateRoadSegment(cells, false);
      }

      // Road decoration sprite mapping
      const roadDecorSprites = {
        road_cross: sprites.l0.road_cross,
        road_bridge: sprites.l0.road_bridge,
        road_tunnel: sprites.l0.road_tunnel,
        parking: sprites.l0.road_park,
        tree: sprites.l0.grass,      // reuse grass sprites (street trees)
        lamp: sprites.l0.sidewalk,   // reuse sidewalk sprites (street lamps)
        food_truck: sprites.l0.urban, // reuse urban sprites (food trucks)
      };

      // Draw road decorations (depth sorted with everything else)
      // We'll add them to the main draw list below

      // Build draw list for depth-sorted sprites
      const drawList = [];
      const hitMap = [];

      for (let w = 0; w < WEEKS; w++) {
        for (let d = 0; d < DAYS; d++) {
          const cell = contributions[w][d];
          drawList.push({ depth: w + d, type: 'cell', w, d, cell });
        }
      }

      // Sort back to front
      drawList.sort((a, b) => a.depth - b.depth);

      // Render
      const rng = mulberry32(12345);

      for (const item of drawList) {
        const { w, d, cell } = item;
        const scr = gridToScreen(w, d);

        // Hit map for tooltips
        hitMap.push({ cx: scr.x, cy: scr.y, w: TILE_W, h: TILE_H, data: cell });

        // Pick and draw sprite
        let spriteImg = null;
        const seed = (w * 7 + d) * 31337 + 12345;
        const cellRng = mulberry32(seed);

        // Road cells: draw road decoration sprite if assigned, never buildings
        if (isRoadCell(w, d)) {
          const decor = roadDecorMap[w][d];
          if (decor && roadDecorSprites[decor] && roadDecorSprites[decor].length > 0) {
            const variants = roadDecorSprites[decor];
            spriteImg = variants[Math.floor(cellRng() * variants.length)];
          }
          if (spriteImg) {
            const sw = spriteImg.width * SPRITE_SCALE;
            const sh = spriteImg.height * SPRITE_SCALE;
            const sx = scr.x - sw / 2;
            const sy = scr.y - sh + TILE_H / 4;
            ctx.drawImage(spriteImg, sx, sy, sw, sh);
          }
          continue; // Never draw buildings on roads
        }

        if (cell.level === 0) {
          // Non-road L0: decorative sprites (parks, sidewalks, etc.)
          const l0Type = l0Map[w][d];
          if (l0Type && sprites.l0[l0Type] && sprites.l0[l0Type].length > 0) {
            const variants = sprites.l0[l0Type];
            spriteImg = variants[Math.floor(cellRng() * variants.length)];
          }
        } else if (sprites[cell.level] && sprites[cell.level].length > 0) {
          // L1-4: random variant
          const variants = sprites[cell.level];
          spriteImg = variants[Math.floor(cellRng() * variants.length)];
        }

        if (spriteImg) {
          const sw = spriteImg.width * SPRITE_SCALE;
          const sh = spriteImg.height * SPRITE_SCALE;

          // Anchor at bottom-center of sprite, on the tile center
          const sx = scr.x - sw / 2;
          const sy = scr.y - sh + TILE_H / 4;

          ctx.drawImage(spriteImg, sx, sy, sw, sh);
        } else {
          // Fallback: draw a simple ground diamond
          const groundColor = THEME.groundColors[((w + d) * 7 + w) % THEME.groundColors.length];
          drawIsoDiamond(ctx, scr.x, scr.y, TILE_W, TILE_H, groundColor, THEME.groundStroke);
        }
      }

      // ========== TOOLTIP ==========
      canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
        const my = (e.clientY - rect.top) * (canvas.height / rect.height);
        let found = null;
        for (let i = hitMap.length - 1; i >= 0; i--) {
          const h = hitMap[i];
          if (Math.abs(mx - h.cx) / (h.w / 2) + Math.abs(my - h.cy) / (h.h / 2) <= 1) {
            found = h.data; break;
          }
        }
        if (found) {
          const dateStr = found.date.toLocaleDateString('en-US', {
            weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
          });
          tooltip.innerHTML = `<strong>${found.count} contributions</strong> on ${dateStr}`;
          tooltip.style.display = 'block';
          tooltip.style.left = e.clientX + 12 + 'px';
          tooltip.style.top = e.clientY - 30 + 'px';
        } else {
          tooltip.style.display = 'none';
        }
      });
      canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
    }

    main();
  </script>
</body>
</html>
